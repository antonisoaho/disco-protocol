<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" fill="none">
  <title>Disco — Disc Golf Social</title>
  <defs>
    <linearGradient id="logo-rim" x1="18%" y1="12%" x2="82%" y2="88%">
      <stop offset="0%" stop-color="#3ecf7a"/>
      <stop offset="45%" stop-color="#1f8a4d"/>
      <stop offset="100%" stop-color="#126b3a"/>
    </linearGradient>
    <linearGradient id="logo-shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Left mark: same artwork as favicon.svg at 0.25× -->
  <g transform="translate(12 16)">
    <g transform="scale(0.25)">
      <rect width="512" height="512" rx="108" fill="#13161e"/>
      <rect width="512" height="512" rx="108" stroke="#252a38" stroke-width="3"/>
      <g transform="translate(256 250) rotate(-9)">
        <ellipse cx="12" cy="26" rx="168" ry="70" fill="#020305" opacity="0.14"/>
        <ellipse cx="6" cy="16" rx="172" ry="74" fill="#020305" opacity="0.22"/>
        <ellipse cx="0" cy="0" rx="178" ry="82" fill="url(#logo-rim)"/>
        <ellipse cx="0" cy="-6" rx="178" ry="82" fill="url(#logo-shine)"/>
        <ellipse cx="0" cy="0" rx="118" ry="50" stroke="#dfe3ec" stroke-opacity="0.33" stroke-width="5"/>
        <ellipse cx="0" cy="0" rx="68" ry="28" stroke="#dfe3ec" stroke-opacity="0.4" stroke-width="4"/>
        <ellipse cx="0" cy="0" rx="32" ry="13" fill="#0b0d12" fill-opacity="0.45"/>
      </g>
    </g>
  </g>
  <text
    x="168"
    y="92"
    fill="#dfe3ec"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-0.02em"
  >Disco</text>
  <text
    x="168"
    y="124"
    fill="#1f8a4d"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="15"
    font-weight="600"
    letter-spacing="0.28em"
  >DISC GOLF</text>
</svg>
