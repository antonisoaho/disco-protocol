<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <title>Disc Golf Social</title>
  <defs>
    <linearGradient id="favicon-rim" x1="18%" y1="12%" x2="82%" y2="88%">
      <stop offset="0%" stop-color="#3ecf7a"/>
      <stop offset="45%" stop-color="#1f8a4d"/>
      <stop offset="100%" stop-color="#126b3a"/>
    </linearGradient>
    <linearGradient id="favicon-shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Safe padding for maskable / squircle crops -->
  <rect width="512" height="512" rx="108" fill="#13161e"/>
  <rect width="512" height="512" rx="108" stroke="#252a38" stroke-width="3"/>
  <!-- Vector-only shadow (no SVG filters) so PNG / PWA raster matches the favicon -->
  <g transform="translate(256 250) rotate(-9)">
    <ellipse cx="12" cy="26" rx="168" ry="70" fill="#020305" opacity="0.14"/>
    <ellipse cx="6" cy="16" rx="172" ry="74" fill="#020305" opacity="0.22"/>
    <ellipse cx="0" cy="0" rx="178" ry="82" fill="url(#favicon-rim)"/>
    <ellipse cx="0" cy="-6" rx="178" ry="82" fill="url(#favicon-shine)"/>
    <ellipse cx="0" cy="0" rx="118" ry="50" stroke="#dfe3ec" stroke-opacity="0.33" stroke-width="5"/>
    <ellipse cx="0" cy="0" rx="68" ry="28" stroke="#dfe3ec" stroke-opacity="0.4" stroke-width="4"/>
    <ellipse cx="0" cy="0" rx="32" ry="13" fill="#0b0d12" fill-opacity="0.45"/>
  </g>
</svg>
