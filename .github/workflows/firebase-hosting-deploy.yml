name: Deploy Firebase Hosting

# Requires repository secrets (Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT — full JSON of a Firebase service account with
#     "Firebase Hosting Admin" (or Editor on the project). Never commit this file.
#   VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID,
#   VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_APP_ID
#   — same values as your local .env.local for a production web app config.

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "index.html"
      - "public/**"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.*.json"
      - "package.json"
      - "package-lock.json"
      - "firebase.json"
      - ".firebaserc"

concurrency:
  group: firebase-hosting-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting
        run: npx firebase deploy --only hosting --non-interactive
